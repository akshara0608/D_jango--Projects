{% extends 'base.html' %}

{% block content %}
<h2 class="text-center mb-4">Create Post</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="title" class="form-control mb-3" placeholder="Title">

    <textarea name="content" class="form-control mb-3" placeholder="Content"></textarea>

    <input type="file" name="image" class="form-control mb-3">

    <button class="btn btn-success w-100">Post</button>
</form>
{% endblock %}
